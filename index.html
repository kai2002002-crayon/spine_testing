<!DOCTYPE html>
<html>
<head>
    <title>超迷你小人展示</title>
    <link rel="stylesheet" href="https://unpkg.com/@esotericsoftware/spine-player@4.1.19/dist/spine-player.css">
    <script src="https://unpkg.com/@esotericsoftware/spine-player@4.1/dist/iife/spine-player.js"></script>
    <script src="data_core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-xl font-bold mb-4">超迷你小人觀測器</h1>
        
        <select id="charSelect" class="w-full p-2 mb-6 border rounded-lg" onchange="loadSpine()">
            <option value="">請選擇角色</option>
        </select>

        <div id="player-wrapper">
            <div id="player-container" class="w-full h-[400px]"></div>
        </div>
    </div>

    <script>
        let currentPlayer = null;

        // 初始化選單
        const select = document.getElementById('charSelect');
        if (typeof SPINE_MAP !== 'undefined') {
            Object.keys(SPINE_MAP).forEach(name => {
                let option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                select.appendChild(option);
            });
        } else {
            alert("找不到 SPINE_MAP，請確認 data_core.js 是否有載入！");
        }

        function loadSpine() {
            const charName = select.value;
            if (!charName) return;

            const skinName = SPINE_MAP[charName];
            console.log(`準備載入... 角色: ${charName}, 預期 Skin: ${skinName}`);

            // 💡 升級 1：必須先銷毀舊的播放器，否則 WebGL 記憶體會崩潰！
            if (currentPlayer) {
                currentPlayer.dispose();
                currentPlayer = null;
            }

            // 安全重建容器
            const wrapper = document.getElementById('player-wrapper');
            wrapper.innerHTML = '<div id="player-container" class="w-full h-[400px]"></div>';

            // 建立新的 Spine Player
            currentPlayer = new spine.SpinePlayer("player-container", {
                skelUrl: "Minimi.skel.bytes",
                atlasUrl: "Minimi.atlas.txt",
                // 💡 升級 2：我們先不直接在這裡給 skin，等載入成功後再手動穿衣服最穩！
                showControls: true,
                backgroundColor: "#f3f4f6",
                alpha: true,
                premultipliedAlpha: true, 
                
                success: (player) => {
                    console.log("✅ 骨架載入成功!");
                    
                    // --- 🔍 偵錯神器：印出這包骨架到底有哪些 Skin 可以用 ---
                    const availableSkins = player.skeleton.data.skins.map(s => s.name);
                    console.log("📦 骨架內包含的所有 Skin 清單:", availableSkins);

                    // --- 👗 升級 3：手動強制換裝並重置插槽 ---
                    if (availableSkins.includes(skinName)) {
                        player.skeleton.setSkinByName(skinName);
                        player.skeleton.setSlotsToSetupPose(); // 🌟 極度關鍵：告訴 Spine 重新把圖片掛到骨架上
                        console.log(`✨ 已成功套用 Skin: ${skinName}`);
                    } else {
                        console.error(`❌ 找不到名為 "${skinName}" 的 Skin！`);
                        alert(`骨架中沒有 "${skinName}"！請按 F12 檢查 Console 裡的可用名單，並修正您的 SPINE_MAP。`);
                        
                        // 為了不讓畫面空著，隨便抓第一個非 default 的 Skin 來展示
                        if (availableSkins.length > 1) {
                            let fallbackSkin = availableSkins[1];
                            player.skeleton.setSkinByName(fallbackSkin);
                            player.skeleton.setSlotsToSetupPose();
                            console.log(`已自動替換為備用 Skin: ${fallbackSkin}`);
                        }
                    }

                    // --- 🎬 播放動畫 ---
                    const anims = player.skeleton.data.animations.map(a => a.name);
                    let targetAnim = anims.includes("Idle") ? "Idle" : (anims.includes("idle") ? "idle" : anims[0]);
                    
                    if (targetAnim) {
                        player.animationState.setAnimation(0, targetAnim, true);
                    }
                },
                error: (player, reason) => {
                    console.error("❌ 載入失敗原因:", reason);
                }
            });
        }
    </script>
</body>
</html>
